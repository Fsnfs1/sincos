    <style>
        :root {
            --primary: #3B82F6; --success: #10B981; --danger: #EF4444;
            --dark: #030712; --light: #F8FAFC; --accent: #FACC15;
            --glowing-cyan: #06B6D4;
        }

        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        html { transition: transform 0.3s ease-out; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--dark); color: var(--light); user-select: none; touch-action: none; }

        .game-wrapper { display: flex; width: 100%; height: 100%; overflow: hidden; }

        .geometry-pane { position: relative; flex: 2; height: 100%; border-right: 4px solid #334155; overflow: hidden; display: flex; flex-direction: column; box-sizing: border-box; cursor: crosshair;}
        .viz-layer { flex: 1; min-height: 0; width: 100%; position: relative; }

        #ripple-canvas { z-index: 3; pointer-events: none; }

        .level-up-banner { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0.5); font-size: 5rem; font-weight: bold; color: var(--accent); text-shadow: 0 0 40px var(--accent); z-index: 50; opacity: 0; pointer-events: none; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); background: rgba(0,0,0,0.8); padding: 20px 40px; border-radius: 20px; border: 4px solid var(--accent); white-space: nowrap;}
        .level-up-banner.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        .info-pane { flex: 1; height: 100%; background: radial-gradient(circle at top right, #1f2937 0%, #030712 100%); display: flex; flex-direction: column; padding: 40px; box-sizing: border-box; justify-content: space-between; align-items: stretch; border-left: 2px solid #1f2937; z-index: 10;}

        .penalty-box.show { opacity: 1; }

        .slot.active { animation: pulseActiveSlot 0.7s infinite; border-style: solid; z-index: 10; }
        .slot.filled { border-style: solid; border-color: var(--primary); color: var(--primary); background: rgba(59, 130, 246, 0.15); font-size: 5rem; box-shadow: 0 0 30px rgba(59, 130, 246, 0.4); transform: scale(1); animation: none; z-index: 1; }
        .frac-line { width: 100%; height: 8px; background-color: var(--light); border-radius: 4px; }

        @keyframes bgShake { 0% { transform: translate(0,0); } 20% { transform: translate(-25px, 15px) rotate(-1deg); } 40% { transform: translate(25px, -15px) rotate(1deg); } 60% { transform: translate(-25px, -15px) rotate(-1deg); } 80% { transform: translate(25px, 15px) rotate(1deg); } 100% { transform: translate(0,0); } }

        .main-success { border-right: 15px solid var(--success); box-shadow: inset 0 0 150px rgba(16,185,129,0.3); transition: all 0.3s; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(7, 11, 20, 0.99); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; -webkit-backdrop-filter: blur(15px); backdrop-filter: blur(15px); }
        .hidden { display: none !important; }

        .player-input { font-size: 2.5rem; padding: 20px 40px; border-radius: 20px; border: 4px solid #475569; background: rgba(15,23,42,0.8); color: var(--light); text-align: center; margin-top: 40px; width: 500px; outline: none; }

        .mega-btn:hover { transform: scale(1.05) translateY(-5px); background: #1D4ED8; }
