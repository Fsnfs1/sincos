<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="三角比建构">
    
    <title>三角比建构者 - 本地离线版</title>

    <script id="MathJax-script" async src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js"></script>

    <style>
        :root {
            --primary: #3B82F6; --success: #10B981; --danger: #EF4444;
            --dark: #030712; --light: #F8FAFC; --accent: #FACC15;
            --glowing-cyan: #06B6D4;
        }

        html { font-size: 16px; transition: background-color 0.3s ease-out; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--dark); color: var(--light); user-select: none; touch-action: none; }

        .game-wrapper { display: flex; width: 100%; height: 100%; overflow: hidden; }

        .geometry-pane { position: relative; flex: 2; height: 100%; border-right: 4px solid #334155; overflow: hidden; display: flex; flex-direction: column; box-sizing: border-box; cursor: crosshair;}
        .viz-layer { flex: 1; min-height: 0; width: 100%; position: relative; }

        #main-canvas, #particle-canvas, #ripple-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; object-fit: cover;}
        #particle-canvas { z-index: 2; pointer-events: none; }
        #ripple-canvas { z-index: 3; pointer-events: none; }

        .q-floating-header { 
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
            width: 95%; z-index: 10; display: flex; flex-direction: column; 
            align-items: center; pointer-events: none; 
        }
        
        .question-stem { 
            font-size: clamp(1.1rem, 2.5vw, 1.5rem); font-weight: bold; 
            background: rgba(15, 23, 42, 0.9); padding: 6px 20px; 
            border-radius: 12px; border: 2px solid #475569; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); color: var(--light); text-align: center;
        }
        
        .instruction-text { 
            font-size: clamp(0.9rem, 2vw, 1.2rem); color: var(--accent); margin-top: 5px; 
            font-weight: bold; padding: 4px 15px; background: rgba(0,0,0,0.75); 
            border-radius: 8px; text-align: center;
        }

        .level-up-banner { 
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0.5); 
            font-size: clamp(1.2rem, 5vw, 2.5rem); font-weight: bold; color: var(--accent); 
            text-shadow: 0 0 20px rgba(250,204,21,0.5); z-index: 50; opacity: 0; pointer-events: none; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); background: rgba(0,0,0,0.85); 
            padding: 10px 20px; border-radius: 15px; border: 3px solid var(--accent); width: 85%;
            max-width: 450px; text-align: center; white-space: normal; line-height: 1.4;
        }
        .level-up-banner.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        .info-pane { flex: 1; height: 100%; background: radial-gradient(circle at top right, #1f2937 0%, #030712 100%); display: flex; flex-direction: column; padding: 4%; box-sizing: border-box; justify-content: space-between; align-items: stretch; border-left: 2px solid #1f2937; z-index: 10;}

        .info-card { background: rgba(255,255,255,0.03); border: 3px solid #334155; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.4); margin-bottom: 20px;}
        .player-info { font-size: clamp(1.1rem, 1.5vw, 1.5rem); color: #94A3B8; margin-bottom: 10px; font-weight: bold; }
        .score-box { font-size: clamp(1.5rem, 3vw, 2.5rem); color: var(--accent); font-weight: bold; font-family: monospace; position: relative;}
        
        .combo-box { 
            font-size: clamp(1rem, 2vw, 1.5rem); color: var(--glowing-cyan); font-style: italic; 
            opacity: 0; transition: opacity 0.2s, transform 0.2s; 
            position: absolute; bottom: 100%; right: 0; margin-bottom: 5px; 
            white-space: nowrap; pointer-events: none;
        }
        .combo-box.show { opacity: 1; transform: scale(1.1) translateY(-2px); }
        
        .penalty-box { 
            font-size: clamp(0.9rem, 1.5vw, 1.3rem); color: var(--danger); font-weight: bold; 
            opacity: 0; transition: opacity 0.2s; 
            position: absolute; bottom: 100%; right: 0; margin-bottom: 5px; 
            white-space: nowrap; pointer-events: none;
        }
        .penalty-box.show { opacity: 1; }

        .timer-box { font-size: clamp(2rem, 4vw, 3.5rem); color: var(--success); font-weight: bold; font-family: monospace; text-shadow: 0 0 20px rgba(16,185,129,0.5); margin-top: 5px;}
        .timer-warning { color: var(--danger); text-shadow: 0 0 20px rgba(239,68,68,0.8); animation: pulseTimer 0.5s infinite alternate; }
        @keyframes pulseTimer { from { transform: scale(1); } to { transform: scale(1.05); } }

        .formula-zone { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; background: rgba(0,0,0,0.2); border-radius: 20px; border: 4px solid var(--primary); padding: 5%; box-shadow: 0 0 40px rgba(59, 130, 246, 0.2); transition: filter 0.3s;}
        .formula-zone.locked { filter: grayscale(100%) opacity(0.3); pointer-events: none;}
        .formula-title { font-size: clamp(1.2rem, 2.5vw, 2rem); color: #94A3B8; margin-top: 0; margin-bottom: 15px; letter-spacing: 2px;}

        .fraction-builder { display: flex; align-items: center; gap: 15px; font-family: 'Times New Roman', serif; }
        .func-label { font-size: clamp(2.5rem, 5vw, 4.5rem); font-weight: bold; color: var(--light); }
        .fraction-visual { display: flex; flex-direction: column; align-items: center; gap: 10px; min-width: 120px; width: auto;}
        
        .slot { width: 100%; min-width: 100px; max-width: 180px; padding: 12px 10px; border: 4px dashed #475569; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: clamp(1.8rem, 3vw, 2.8rem); font-weight: bold; color: #64748B; transition: all 0.2s; box-sizing: border-box;}

        @keyframes pulseActiveSlot { 0%, 100% { border-color: var(--accent); box-shadow: 0 0 20px rgba(250, 204, 21, 0.3); transform: scale(1.02); background: rgba(250, 204, 21, 0.05); color: var(--accent); } 50% { border-color: #FFF; box-shadow: 0 0 60px rgba(250, 204, 21, 0.8); transform: scale(1.1); background: rgba(250, 204, 21, 0.2); color: #FFF; } }
        .slot.active { animation: pulseActiveSlot 0.7s infinite; border-style: solid; z-index: 10; }
        .slot.filled { border-style: solid; border-color: var(--primary); color: var(--primary); background: rgba(59, 130, 246, 0.15); box-shadow: 0 0 30px rgba(59, 130, 246, 0.4); transform: scale(1); animation: none; z-index: 1; }
        .frac-line { width: 100%; height: 6px; background-color: var(--light); border-radius: 4px; }

        @keyframes bgShake { 0% { transform: translate(0,0); } 20% { transform: translate(-15px, 10px) rotate(-1deg); } 40% { transform: translate(15px, -10px) rotate(1deg); } 60% { transform: translate(-15px, -10px) rotate(-1deg); } 80% { transform: translate(15px, 10px) rotate(1deg); } 100% { transform: translate(0,0); } }
        .main-error { animation: bgShake 0.35s ease-in-out both; border-right: 15px solid var(--danger) !important; box-shadow: inset 0 0 250px rgba(239,68,68,0.7) !important; }
        .main-success { border-right: 15px solid var(--success); box-shadow: inset 0 0 150px rgba(16,185,129,0.3); transition: all 0.3s; }

        .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(7, 11, 20, 0.99); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; -webkit-backdrop-filter: blur(15px); backdrop-filter: blur(15px); }
        .hidden { display: none !important; }

        .player-input { font-size: clamp(1.2rem, 2vw, 1.8rem); padding: 15px 30px; border-radius: 20px; border: 4px solid #475569; background: rgba(15,23,42,0.8); color: var(--light); text-align: center; margin-top: 30px; width: 80%; max-width: 400px; outline: none; }
        .player-input:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
        .mega-btn { padding: 12px 30px; font-size: clamp(1.5rem, 3vw, 2.2rem); background: var(--primary); color: white; border: none; border-radius: 15px; cursor: pointer; box-shadow: 0 15px 40px rgba(37, 99, 235, 0.5); transition: all 0.2s; white-space: nowrap; outline: none; -webkit-tap-highlight-color: transparent;}
        .mega-btn:hover, .mega-btn:active { transform: scale(1.05) translateY(-2px); background: #1D4ED8; }

        .leaderboard-box { background: rgba(15, 23, 42, 0.9); border: 4px solid var(--accent); border-radius: 20px; padding: 25px; width: 90%; max-width: 600px; box-shadow: 0 20px 60px rgba(0,0,0,0.8); margin: 20px 0; }
        .leaderboard-table { width: 100%; border-collapse: collapse; font-size: clamp(1.2rem, 2.5vw, 1.8rem); text-align: center; }
        .leaderboard-table th { color: #94A3B8; padding-bottom: 10px; border-bottom: 2px solid #334155; }
        .leaderboard-table td { padding: 10px 0; border-bottom: 1px solid #1e293b; }
        @keyframes slideInRank { 0% { opacity: 0; transform: translateX(50px); } 100% { opacity: 1; transform: translateX(0); } }
        @keyframes pulseRank { 0%, 100% { background: rgba(250, 204, 21, 0.2); transform: scale(1); box-shadow: 0 0 20px rgba(250, 204, 21, 0.4); } 50% { background: rgba(250, 204, 21, 0.4); transform: scale(1.02); box-shadow: 0 0 40px rgba(250, 204, 21, 0.8); } }
        .current-player-rank { color: var(--accent); font-weight: bold; border-radius: 10px; animation: pulseRank 1s infinite alternate !important; }

        .ritual-text { position: absolute; font-size: clamp(2.5rem, 5vw, 5rem); font-weight: bold; font-style: italic; opacity: 0; z-index: 50; text-shadow: 0 0 30px rgba(0,0,0,0.9); pointer-events: none; }
        @keyframes flyUp { 0% { opacity: 1; transform: translateY(40px) scale(0.5); } 20% { opacity: 1; transform: translateY(0) scale(1.2); } 80% { opacity: 1; transform: translateY(-100px) scale(1); } 100% { opacity: 0; transform: translateY(-150px) scale(0.8); } }

        .fullscreen-btn { position: fixed; top: 10px; right: 10px; background: rgba(15, 23, 42, 0.8); border: 2px solid #475569; color: var(--light); padding: 8px 16px; border-radius: 10px; cursor: pointer; font-size: clamp(0.9rem, 1.5vw, 1.2rem); font-weight: bold; z-index: 1000; transition: all 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .fullscreen-btn:hover { border-color: var(--accent); color: var(--accent); transform: scale(1.05); }

        .controls-top-left { position: fixed; top: 10px; left: 10px; z-index: 1000; display: flex; gap: 10px; }
        .layout-btn { background: rgba(15, 23, 42, 0.8); border: 2px solid #475569; color: var(--light); padding: 8px 16px; border-radius: 10px; cursor: pointer; font-size: clamp(0.9rem, 1.5vw, 1.2rem); font-weight: bold; transition: all 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .layout-btn.active-layout { border-color: var(--accent); color: var(--accent); }

        .game-wrapper.portrait { flex-direction: column; }
        .game-wrapper.portrait .geometry-pane { flex: 1.6; border-right: none; border-bottom: 4px solid #334155; width: 100%; position: relative;}
        .game-wrapper.portrait .info-pane { flex: 1; border-left: none; width: 100%; padding: 15px; display: flex; justify-content: center;}
        
        .game-wrapper.portrait .formula-zone { position: relative !important; margin: 0; width: 100%; height: 100%; box-sizing: border-box; }

        .geometry-pane #stats-card {
            position: absolute; bottom: 15px; left: 0; width: 100%; background: transparent;
            border: none; box-shadow: none; padding: 0 25px; margin: 0; z-index: 20; box-sizing: border-box;
        }
        .geometry-pane #stats-card .player-info,
        .geometry-pane #stats-card .hr-divider { display: none; }
        .geometry-pane #stats-card .stats-container {
            display: flex; flex-direction: row; justify-content: space-between; align-items: flex-end; width: 100%;
        }
        .geometry-pane #stats-card .stat-left { text-align: left; }
        .geometry-pane #stats-card .stat-right { position: relative; text-align: right; display: flex; flex-direction: column; align-items: flex-end; }
        .geometry-pane #stats-card .timer-box, .geometry-pane #stats-card .score-box { text-shadow: 0 0 10px rgba(0,0,0,0.8); margin: 0;}

    </style>
</head>
<body>

<div class="controls-top-left">
    <button id="btn-return" class="layout-btn hidden" style="background: rgba(239, 68, 68, 0.8); border-color: #B91C1C;" onclick="returnToMenu()">🏠 返回</button>
    <button id="btn-portrait" class="layout-btn" onclick="setLayout('portrait')">📱 竖屏</button>
    <button id="btn-landscape" class="layout-btn" onclick="setLayout('landscape')">💻 横屏</button>
</div>

<div id="start-screen" class="overlay">
    <h1 style="font-size: clamp(2rem, 5vw, 4rem); margin-bottom: 0; text-shadow: 0 0 50px var(--glowing-cyan); color: var(--glowing-cyan); text-align: center;">⚔️ 三角比建构者 ⚔️</h1>
    <p style="font-size: clamp(1rem, 2vw, 1.8rem); color: #94A3B8; margin-top: 10px; font-weight: bold; text-align: center;">本地离线版</p>

    <input type="text" id="player-name" class="player-input" placeholder="输入玩家代号..." autocomplete="off" maxlength="12">

    <div style="color: var(--danger); font-size: clamp(0.9rem, 1.5vw, 1.2rem); margin-top: 15px; font-weight: bold; text-align: center; background: rgba(0,0,0,0.5); padding: 8px 15px; border-radius: 8px;">
        ⚠️ 苹果 iOS 玩家请注意：请务必关闭手机侧边的「物理静音键」并调大音量
    </div>

    <div style="display: flex; gap: 20px; margin-top: 25px; justify-content: center; flex-wrap: wrap;">
        <button class="mega-btn" ontouchstart="forceUnlockAudio()" onmousedown="forceUnlockAudio()" onclick="startGame('30s')">⏱️ 30秒模式</button>
        <button class="mega-btn" style="background: var(--success);" ontouchstart="forceUnlockAudio()" onmousedown="forceUnlockAudio()" onclick="startGame('practice')">🧘 练习模式</button>
    </div>
</div>

<div class="game-wrapper hidden" id="main-wrapper">
    <div class="geometry-pane" id="geometry-pane">
        <canvas id="particle-canvas"></canvas>
        <canvas id="ripple-canvas"></canvas>
        <div class="q-floating-header">
            <div class="question-stem" id="question-text"></div>
            <div class="instruction-text" id="instruction"></div>
        </div>
        <div class="level-up-banner" id="level-up-banner">🚀 难度升级：向下滑动画出高线！</div>
        <div class="viz-layer">
            <canvas id="main-canvas"></canvas>
        </div>
    </div>

    <div class="info-pane" id="right-pane">
        <div class="info-card" id="stats-card">
            <div class="player-info" id="player-display">玩家: 挑战者</div>
            <div class="stats-container">
                <div class="stat-left">
                    <div class="timer-box" id="timer-display">30.0</div>
                </div>
                <div class="hr-divider" style="height: 2px; background: #334155; margin: 15px 0;"></div>
                <div class="stat-right">
                    <div class="combo-box" id="combo-display">x1 Combo!</div>
                    <div class="penalty-box" id="penalty-display">连错惩罚: -100</div>
                    <div class="score-box">分数: <span id="score-display">0</span></div>
                </div>
            </div>
        </div>

        <div class="formula-zone" id="formula-zone">
            <h3 class="formula-title">建构目标</h3>
            <div class="fraction-builder">
                <div class="func-label" id="ratio-label">sinθ</div>
                <div style="font-size: clamp(2rem, 4vw, 4rem); color: var(--light); font-weight:bold; margin: 0 10px;">=</div>
                <div class="fraction-visual">
                    <div class="slot" id="numerator-slot">分子</div>
                    <div class="frac-line"></div>
                    <div class="slot" id="denominator-slot">分母</div>
                </div>
            </div>
        </div>
    </div>
</div>

<button id="fullscreen-toggle" class="fullscreen-btn hidden" onclick="toggleFullScreen()">退出全屏 ⛶</button>

<script>
    const SoundManager = {
        ctx: null, _sfxGain: null, _bgmGain: null, _bgmTimer: null, _bgmBeat: 0,
        init() {
            if (!this.ctx) {
                const AC = window.AudioContext || window.webkitAudioContext || window.mozAudioContext;
                try { if (AC) this.ctx = new AC(); } catch (e) { this.ctx = null; }
            }
            if (!this.ctx) return;
            if (this.ctx.state === 'suspended') this.ctx.resume().catch(function () {});
            if (!this._sfxGain) { this._sfxGain = this.ctx.createGain(); this._sfxGain.gain.value = 0.9; this._sfxGain.connect(this.ctx.destination); }
            if (!this._bgmGain) { this._bgmGain = this.ctx.createGain(); this._bgmGain.gain.value = 0.13; this._bgmGain.connect(this.ctx.destination); }
        },
        _panFromClientX(clientX) {
            if (clientX == null || typeof clientX !== 'number') return 0;
            return Math.max(-1, Math.min(1, (clientX / (window.innerWidth || 1)) * 2 - 1));
        },
        _connectToSFX(fromNode, pan) {
            if (!this.ctx || !this._sfxGain) return;
            const ac = this.ctx; const t = ac.currentTime;
            if (ac.createStereoPanner) { const panner = ac.createStereoPanner(); panner.pan.setValueAtTime(pan, t); fromNode.connect(panner); panner.connect(this._sfxGain); } 
            else { fromNode.connect(this._sfxGain); }
        },
        playLineHum(clientX) {
            this.init(); if (!this.ctx) return;
            const ac = this.ctx; const t = ac.currentTime; const pan = this._panFromClientX(clientX);
            const osc = ac.createOscillator(); const g = ac.createGain(); const f0 = 220 + Math.random() * 35;
            osc.type = 'sine'; osc.frequency.setValueAtTime(f0, t); osc.frequency.linearRampToValueAtTime(f0 + 45, t + 0.06);
            g.gain.setValueAtTime(0.045, t); g.gain.exponentialRampToValueAtTime(0.002, t + 0.07);
            osc.connect(g); this._connectToSFX(g, pan); osc.start(t); osc.stop(t + 0.08);
        },
        startBGM() {
            this.init(); if (!this.ctx || this._bgmTimer != null) return;
            const self = this; const ac = this.ctx; const chords = [[130.81, 164.81, 196.0], [116.54, 146.83, 174.61], [98.0, 123.47, 146.83], [110.0, 138.59, 164.81]];
            this._bgmBeat = 0;
            this._bgmTimer = setInterval(function () {
                if (gameState === 'GAMEOVER') { self.stopBGM(); return; }
                const t = ac.currentTime; const beat = self._bgmBeat++; const chord = chords[Math.floor(beat / 8) % chords.length];
                if (beat % 2 === 0) {
                    const o = ac.createOscillator(); const g = ac.createGain(); const filt = ac.createBiquadFilter();
                    filt.type = 'lowpass'; filt.frequency.setValueAtTime(420, t); o.type = 'triangle'; o.frequency.setValueAtTime(chord[0] * 0.5, t);
                    o.connect(filt); filt.connect(g); g.connect(self._bgmGain); g.gain.setValueAtTime(0.11, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
                    o.start(t); o.stop(t + 0.23);
                }
            }, 300);
        },
        stopBGM() { if (this._bgmTimer != null) { clearInterval(this._bgmTimer); this._bgmTimer = null; } },
        play(type, clientX) {
            this.init(); if (!this.ctx) return;
            const ac = this.ctx; const t = ac.currentTime; const pan = this._panFromClientX(clientX);
            function layerChord(freqs, types, vol, dur, panSpread) {
                const t0 = ac.currentTime;
                freqs.forEach(function (f, i) {
                    const o = ac.createOscillator(); const g = ac.createGain(); o.type = types[i] || 'sine'; o.frequency.setValueAtTime(f, t0);
                    const offset = panSpread ? (i - (freqs.length - 1) / 2) * 0.4 : 0; o.connect(g); const pL = pan + offset;
                    if (ac.createStereoPanner) { const p = ac.createStereoPanner(); p.pan.setValueAtTime(Math.max(-1, Math.min(1, pL)), t0); g.connect(p); p.connect(SoundManager._sfxGain); } 
                    else { g.connect(SoundManager._sfxGain); }
                    g.gain.setValueAtTime(0, t0); g.gain.linearRampToValueAtTime(vol * (0.35 + i * 0.15), t0 + 0.03); g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
                    o.start(t0); o.stop(t0 + dur + 0.05);
                });
            }
            switch (type) {
                case 'start': layerChord([261.63, 329.63, 392.0, 523.25], ['sine', 'triangle', 'sine', 'triangle'], 0.11, 0.55, true); break;
                case 'lineGrab': { const o = ac.createOscillator(); const g = ac.createGain(); o.type = 'triangle'; o.frequency.setValueAtTime(380, t); o.frequency.exponentialRampToValueAtTime(120, t + 0.18); g.gain.setValueAtTime(0.14, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.22); o.connect(g); this._connectToSFX(g, pan); o.start(t); o.stop(t + 0.23); break; }
                case 'lineComplete': { layerChord([196, 246.94, 293.66, 392], ['triangle', 'sine', 'sine', 'triangle'], 0.14, 0.85, true); break; }
                case 'levelUp': layerChord([311.13, 392, 466.16, 587.33], ['sine', 'triangle', 'sine', 'triangle'], 0.12, 0.7, true); break;
                case 'correct': layerChord([523.25, 659.25, 783.99], ['triangle', 'sine', 'sine'], 0.13, 0.28, true); break;
                case 'wrong': { const o = ac.createOscillator(); const g = ac.createGain(); o.type = 'sawtooth'; o.frequency.setValueAtTime(165, t); o.frequency.exponentialRampToValueAtTime(45, t + 0.35); g.gain.setValueAtTime(0.16, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.42); o.connect(g); this._connectToSFX(g, -pan); o.start(t); o.stop(t + 0.43); break; }
                case 'success': layerChord([392, 493.88, 587.33, 698.46], ['sine', 'triangle', 'sine', 'triangle'], 0.12, 0.65, true); break;

    }

    function drawRightAngle(ctx, vertex, p1, p2, size) { 
        let v1x = p1.x - vertex.x, v1y = p1.y - vertex.y; let len1 = Math.hypot(v1x, v1y) || 1; v1x = (v1x / len1) * size; v1y = (v1y / len1) * size;
        let v2x = p2.x - vertex.x, v2y = p2.y - vertex.y; let len2 = Math.hypot(v2x, v2y) || 1; v2x = (v2x / len2) * size; v2y = (v2y / len2) * size;
        ctx.strokeStyle = "rgba(148, 163, 184, 0.7)"; ctx.lineWidth = Math.max(2, ctx.canvas.width * 0.005); 
        ctx.beginPath(); ctx.moveTo(vertex.x + v1x, vertex.y + v1y); ctx.lineTo(vertex.x + v1x + v2x, vertex.y + v1y + v2y); ctx.lineTo(vertex.x + v2x, vertex.y + v2y); ctx.stroke(); 
    }
    
    function drawVertexLabelSmart(ctx, p, text, cx, cy, offsetDist, colorRgb) { 
        const dx = p.x - cx, dy = p.y - cy; const len = Math.hypot(dx, dy) || 1;
        const offX = (dx / len) * offsetDist, offY = (dy / len) * offsetDist;
        const fSize = Math.max(14, ctx.canvas.width * 0.035); 
        ctx.fillStyle = `rgba(${colorRgb}, 1)`; ctx.font = `bold ${fSize}px sans-serif`; ctx.textAlign="center"; ctx.textBaseline="middle"; 
        ctx.fillText(text, p.x + offX, p.y + offY); 
    }
    
    function drawEdgeLabel(ctx, p1, p2, text) {
        const mx = (p1.x + p2.x)/2; const my = (p1.y + p2.y)/2; 
        const fSize = Math.max(12, ctx.canvas.width * 0.035); ctx.font = `bold ${fSize}px 'Segoe UI'`; 
        const w = ctx.measureText(text).width;
        const padX = fSize * 0.3, padY = fSize * 0.3; 
        const bx = mx - w/2 - padX, by = my - fSize/2 - padY, bw = w + padX*2, bh = fSize + padY*2, br = 6;
        ctx.fillStyle = "rgba(15, 23, 42, 0.85)"; ctx.beginPath();
        if (typeof ctx.roundRect === "function") { ctx.roundRect(bx, by, bw, bh, br); } else { ctx.moveTo(bx + br, by); ctx.lineTo(bx + bw - br, by); ctx.quadraticCurveTo(bx + bw, by, bx + bw, by + br); ctx.lineTo(bx + bw, by + bh - br); ctx.quadraticCurveTo(bx + bw, by + bh, bx + bw - br, by + bh); ctx.lineTo(bx + br, by + bh); ctx.quadraticCurveTo(bx, by + bh, bx, by + bh - br); ctx.lineTo(bx, by + br); ctx.quadraticCurveTo(bx, by, bx + br, by); }
        ctx.fill(); ctx.fillStyle = "#F8FAFC"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(text, mx, my);
    }

    function updateUI() {
        document.getElementById("score-display").innerText = score;
        const comboEl = document.getElementById("combo-display"); if(combo > 1) { comboEl.innerText = `x${combo} Combo!`; comboEl.classList.add("show"); } else { comboEl.classList.remove("show"); }
        const penaltyEl = document.getElementById("penalty-display"); if(wrongCombo > 0) { let pVal = 100 * Math.pow(2, wrongCombo - 1); penaltyEl.innerText = `连错惩罚: -${pVal}`; penaltyEl.classList.add("show"); penaltyEl.style.color = "var(--danger)"; } else { penaltyEl.classList.remove("show"); }
    }

    function handlePenalty() { try { SoundManager.play('wrong', lastPointerClientX); } catch(e){} wrongCombo++; combo = 0; currentLevel = 1; let penalty = 100 * Math.pow(2, wrongCombo - 1); score = Math.max(0, score - penalty); updateUI(); const geometryPane = document.getElementById("geometry-pane"); geometryPane.classList.add("main-error"); setTimeout(() => geometryPane.classList.remove("main-error"), 400); if(gameState === "DRAWING_PHASE") setTimeout(() => { if (gameState !== "GAMEOVER") nextMission(); }, 500); }

    function nextMission() {
        if (gameState === "GAMEOVER") return;
        try {
            if (combo >= 6 && currentLevel < 3) {
                currentLevel = 3; try{ SoundManager.play('levelUp'); }catch(e){}
                const banner = document.getElementById("level-up-banner"); banner.innerText = "🌀 终极挑战：全向空间建构！"; banner.classList.add("show"); setTimeout(()=> banner.classList.remove("show"), 1500);
            } else if (combo >= 3 && combo < 6 && currentLevel < 2) {
                currentLevel = 2; try{ SoundManager.play('levelUp'); }catch(e){}
                const banner = document.getElementById("level-up-banner"); banner.innerText = "🚀 难度升级：画出高线！"; banner.classList.add("show"); setTimeout(()=> banner.classList.remove("show"), 1500);
            }
            
            currentMission = generateMission(currentLevel); 
            
            numFilled = false; denFilled = false; flashEdge = null; isDragging = false;
            document.getElementById("question-text").innerHTML = `在 \\(\\triangle ABC\\) 中，求 \\(${currentMission.ratioMath}\\)`; document.getElementById("ratio-label").innerHTML = `\\(${currentMission.ratioMath}\\)`;
            resetSlot("numerator-slot", "分子"); resetSlot("denominator-slot", "分母");
            if (currentLevel >= 2) { gameState = "DRAWING_PHASE"; document.getElementById("formula-zone").classList.add("locked"); } else { gameState = "SELECTION_PHASE"; document.getElementById("formula-zone").classList.remove("locked"); }
            updateInstruction(); drawGeometry();
            if (window.MathJax && window.MathJax.typesetClear) { try { window.MathJax.typesetClear(); if (window.MathJax.typesetPromise) window.MathJax.typesetPromise().catch(() => {}); else window.MathJax.typeset(); } catch(e) {} }
        } catch (error) { console.error("nextMission() fatal:", error); }
    }

    function handleEdgeSelection(edgeType) {
        let matched = false, targetSlotId = null, earlyDenominator = false;
        if (!numFilled) { if (edgeType === currentMission.steps.num) { targetSlotId = "numerator-slot"; numFilled = true; matched = true; } else if (edgeType === currentMission.steps.den) earlyDenominator = true; } else if (!denFilled) { if (edgeType === currentMission.steps.den) { targetSlotId = "denominator-slot"; denFilled = true; matched = true; } }
        if (matched) {
            try { SoundManager.play('correct', lastPointerClientX); } catch(e){}
            combo++; wrongCombo = 0; score += 100 * combo; fillSlot(targetSlotId, currentMission.data[edgeType]); flashEdge = { id: edgeType, color: "#10B981", timer: Date.now() + 300 }; drawGeometry();
            const paneRect = document.getElementById("geometry-pane").getBoundingClientRect(); createExplosion(paneRect.width/2, paneRect.height/2); showFloatingText(combo > 3 ? "GODLIKE!" : "NICE!", "#10B981");
            if (numFilled && denFilled) { try { SoundManager.play('success', lastPointerClientX); } catch(e){} gameState = "SUCCESS"; document.getElementById("instruction").innerText = "✨ 建构完成！ ✨"; document.getElementById("geometry-pane").classList.add("main-success"); updateUI(); setTimeout(() => { document.getElementById("geometry-pane").classList.remove("main-success"); if (gameState !== "GAMEOVER") nextMission(); }, 700); } else { updateInstruction(); }
            updateUI();
        } else { flashEdge = { id: edgeType, color: "#EF4444", timer: Date.now() + 400 }; drawGeometry(); if (earlyDenominator) showFloatingText("请先寻找分子", "#EF4444"); handlePenalty(); }
    }

    function saveAndGetLeaderboard() { let board = []; try { board = JSON.parse(localStorage.getItem('trigClassroomBoard')) || []; if (gameMode !== 'practice') { board.push({ name: currentPlayer, score: score }); board.sort((a, b) => b.score - a.score); board = board.slice(0, 5); localStorage.setItem('trigClassroomBoard', JSON.stringify(board)); } } catch (e) { console.warn("Storage restricted"); } return board; }

    function endGame() {
        try { SoundManager.stopBGM(); SoundManager.play('gameover'); } catch(e){} clearInterval(timerInterval); gameState = "GAMEOVER";
        document.getElementById('btn-return').classList.add('hidden');

        const board = saveAndGetLeaderboard(); let boardHTML = `<div class="leaderboard-box"><h2 style="color: var(--accent); font-size: clamp(2rem, 4vw, 3rem); margin-top: 0; margin-bottom: 20px; text-shadow: 0 0 20px var(--accent);">🏆 荣誉殿堂 🏆</h2><table class="leaderboard-table"><tr><th>排名</th><th>玩家</th><th>分数</th></tr>`;
        board.forEach((entry, idx) => { let rank = idx === 0 ? '🥇' : (idx === 1 ? '🥈' : (idx === 2 ? '🥉' : idx + 1)); let highlight = (entry.name === currentPlayer && entry.score === score) ? 'class="current-player-rank"' : ''; boardHTML += `<tr ${highlight} style="animation: slideInRank 0.5s ease forwards; animation-delay: ${idx * 0.15}s; opacity: 0;"><td>${rank}</td><td>${entry.name}</td><td>${entry.score}</td></tr>`; }); boardHTML += `</table></div>`;
        const endScreen = document.createElement('div'); endScreen.className = "overlay";
        endScreen.innerHTML = `<h1 style="font-size: clamp(3rem, 6vw, 6rem); margin-bottom: 10px; color: #FACC15; text-shadow: 0 0 50px rgba(250,204,21,0.6);">TIME UP!</h1><div style="font-size: clamp(1.5rem, 3vw, 3rem); margin: 10px 0 30px 0;">最终得分：${score}</div>${boardHTML}<button class="mega-btn" onclick="location.reload()" style="margin-top: 20px;">重新挑战</button>`;
        document.body.appendChild(endScreen); createExplosion(window.innerWidth/2, window.innerHeight/4);
    }

    function resetSlot(id, text) { const el = document.getElementById(id); el.className = "slot"; el.innerText = text; el.classList.remove("active"); }
    function activateSlot(id) { document.getElementById(id).classList.add("active"); }
    function fillSlot(id, text) { const el = document.getElementById(id); el.className = "slot filled"; el.innerText = text; el.classList.remove("active");}
    function updateInstruction() { if(gameState === "DRAWING_PHASE") { document.getElementById("instruction").innerText = "🔥 难度升级：请从发光顶点滑向对边，画出高线"; document.getElementById("instruction").style.color = "#EF4444"; } else { if (!numFilled) { document.getElementById("instruction").innerText = `🎯 第一步：点击图形中的 [${stepNames[currentMission.steps.num]}] 作为分子`; activateSlot("numerator-slot"); document.getElementById("denominator-slot").classList.remove("active"); } else if (!denFilled) { document.getElementById("instruction").innerText = `🎯 第二步：点击图形中的 [${stepNames[currentMission.steps.den]}] 作为分母`; document.getElementById("numerator-slot").classList.remove("active"); activateSlot("denominator-slot"); } document.getElementById("instruction").style.color = "#FACC15"; } }
    function showFloatingText(text, color) { const el = document.createElement('div'); el.className = 'ritual-text'; el.innerText = text; el.style.color = color; el.style.left = '50%'; el.style.top = '40%'; el.style.transform = 'translate(-50%, -50%)'; el.style.animation = 'flyUp 1s ease-out forwards'; document.getElementById('geometry-pane').appendChild(el); setTimeout(() => el.remove(), 1000); }
    function varToRgb(varName) { const hex = getComputedStyle(document.documentElement).getPropertyValue(varName).trim(); if(hex.startsWith('#')) return `${parseInt(hex.slice(1, 3), 16)}, ${parseInt(hex.slice(3, 5), 16)}, ${parseInt(hex.slice(5, 7), 16)}`; return "255,255,255"; }
</script>
